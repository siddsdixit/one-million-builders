name: Builder Claim
description: Submit a completed OneMillion build for Builder #N review.
title: "Builder Claim: [Your Name] — [Product Name]"
labels:
  - builder-claim
body:
  - type: markdown
    attributes:
      value: |
        Congrats on finishing Day 18. Submit this claim after your final Claude Code verification passes.

        Builder numbers are issued after review. Your local Day 18 verification means your build is ready to submit; the official Builder #N is assigned when the claim is accepted.
  - type: input
    id: builder_name
    attributes:
      label: Builder name
      description: Your public display name.
      placeholder: "Sarah Designer"
    validations:
      required: true
  - type: input
    id: github_username
    attributes:
      label: GitHub username
      placeholder: "your-github-username"
    validations:
      required: true
  - type: input
    id: course_fork_url
    attributes:
      label: OneMillion course fork URL
      description: Your fork of one-million-builders, not Sid's upstream repo.
      placeholder: "https://github.com/you/one-million-builders"
    validations:
      required: true
  - type: input
    id: product_name
    attributes:
      label: Product name
      placeholder: "DeliverableDash"
    validations:
      required: true
  - type: input
    id: live_url
    attributes:
      label: Live product URL
      placeholder: "https://yourapp.vercel.app"
    validations:
      required: true
  - type: input
    id: demo_url
    attributes:
      label: Public Loom demo URL
      placeholder: "https://www.loom.com/share/..."
    validations:
      required: true
  - type: input
    id: repo_url
    attributes:
      label: GitHub repo URL
      description: Optional if your repo is private.
      placeholder: "https://github.com/you/your-app"
    validations:
      required: false
  - type: dropdown
    id: cohort
    attributes:
      label: Cohort
      options:
        - Self-serve
        - Cohort 0
        - Cohort 1
        - Other
    validations:
      required: true
  - type: textarea
    id: verification_summary
    attributes:
      label: Final verification summary
      description: Paste the Result section from `.onemillion/verification-day-18.md`, including Day 0 + Day 1-18 status.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: day18_report
    attributes:
      label: Day 18 report link or summary
      description: Link to the Day 18 report in your course fork, or paste the key checks if the fork is private.
      render: markdown
    validations:
      required: true
  - type: dropdown
    id: day17_feedback_status
    attributes:
      label: Day 17 feedback status
      description: Choose the status from your Day 17 verification report.
      options:
        - PASS_WITH_FEEDBACK
        - OUTREACH_SENT_PENDING_FEEDBACK
    validations:
      required: true
  - type: textarea
    id: build_summary
    attributes:
      label: What did you build?
      description: Two or three sentences on the product, target user, and core AI feature.
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: My live URL is publicly accessible.
          required: true
        - label: My Loom demo is publicly viewable.
          required: true
        - label: I completed the Day 18 Claude Code verification.
          required: true
        - label: My course fork contains or can provide Day 0 through Day 18 verification evidence.
          required: true
        - label: I consent to be listed on the OneMillion Builder Wall if accepted.
          required: true
